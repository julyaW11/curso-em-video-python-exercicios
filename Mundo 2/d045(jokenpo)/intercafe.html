<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Jokenpô</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f0f0f0;
        padding: 20px;
      }

      h1 {
        color: #333;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .botoes {
        margin: 20px;
      }

      button {
        padding: 15px 30px;
        margin: 10px;
        font-size: 18px;
        cursor: pointer;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        transition: transform 0.1s;
      }

      button:hover {
        transform: scale(1.1);
      }

      #resultado {
        font-size: 24px;
        margin: 20px;
        padding: 20px;
        border-radius: 10px;
      }

      .empate {
        background-color: #32cd32;
        color: white;
      }

      .vitoria {
        background-color: #4169e1;
        color: white;
      }

      .derrota {
        background-color: #ff4500;
        color: white;
      }

      #computadorEscolha {
        font-size: 20px;
        margin: 15px;
      }

      #countdown {
        font-size: 28px;
        margin: 20px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <h1>Pedra, Papel ou Tesoura!</h1>

    <div class="botoes">
      <button onclick="jogar('pedra')">Pedra</button>
      <button onclick="jogar('papel')">Papel</button>
      <button onclick="jogar('tesoura')">Tesoura</button>
    </div>

    <div id="countdown"></div>
    <div id="computadorEscolha"></div>
    <div id="resultado"></div>
    <button id="rejogar" onclick="reiniciarJogo()" style="display: none">
      Jogar Novamente
    </button>

    <script>
      function jogar(escolhaUsuario) {
        const botoes = document.querySelectorAll(".botoes button");
        botoes.forEach((btn) => (btn.disabled = true));

        const countdown = document.getElementById("countdown");
        const computadorEscolha = document.getElementById("computadorEscolha");
        const resultado = document.getElementById("resultado");
        const rejogar = document.getElementById("rejogar");

        // Animação do countdown
        countdown.textContent = "JO...";
        setTimeout(() => {
          countdown.textContent = "KEN...";
          setTimeout(() => {
            countdown.textContent = "PO...";
            setTimeout(() => {
              const opcoes = ["pedra", "papel", "tesoura"];
              const escolhaComputador = opcoes[Math.floor(Math.random() * 3)];

              computadorEscolha.textContent = `O computador escolheu: ${escolhaComputador}`;
              countdown.textContent = "";

              // Determinar o resultado
              if (escolhaUsuario === escolhaComputador) {
                resultado.textContent = "Eita, tivemos um empate!";
                resultado.className = "empate";
              } else if (
                (escolhaUsuario === "pedra" &&
                  escolhaComputador === "tesoura") ||
                (escolhaUsuario === "papel" && escolhaComputador === "pedra") ||
                (escolhaUsuario === "tesoura" && escolhaComputador === "papel")
              ) {
                resultado.textContent = "PARABÉNS, você ganhou!";
                resultado.className = "vitoria";
              } else {
                resultado.textContent = "O computador ganhou!";
                resultado.className = "derrota";
              }

              rejogar.style.display = "inline-block";
            }, 1000);
          }, 1000);
        }, 1000);
      }

      function reiniciarJogo() {
        document
          .querySelectorAll(".botoes button")
          .forEach((btn) => (btn.disabled = false));
        document.getElementById("computadorEscolha").textContent = "";
        document.getElementById("resultado").textContent = "";
        document.getElementById("resultado").className = "";
        document.getElementById("rejogar").style.display = "none";
      }
    </script>
  </body>
</html>
